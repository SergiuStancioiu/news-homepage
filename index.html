<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>News homepage | Frontend Mentor</title>
  </head>
  <body>
    <!-- Header -->
    <header class="header-container">
      <img src="assets/images/logo.svg" alt="Logo" />
      <button class="open-menu">
        <img src="assets/images/icon-menu.svg" alt="Hamburger Icon" />
      </button>
    </header>
    <!-- Mobile menu -->
    <div class="mobile-menu-overlay">
      <div class="mobile-menu">
        <div class="close-button-container">
          <button class="close-menu">
            <img src="assets/images/icon-menu-close.svg" alt="Close Icon" />
          </button>
        </div>
        <nav class="mobile-menu-links-container">
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">New</a></li>
            <li><a href="#">Popular</a></li>
            <li><a href="#">Trending</a></li>
            <li><a href="#">Categories</a></li>
          </ul>
        </nav>
      </div>
    </div>
    <main>
      <!-- Hero-->
      <section class="hero-container">
        <div class="image-container">
          <picture>
            <source
              media="(max-width: 749px)"
              srcset="assets/images/image-web-3-mobile.jpg"
            />
            <img
              class="hero-image"
              src="assets/images/image-web-3-desktop.jpg"
              alt="Hero Image"
            />
          </picture>
        </div>
        <div class="hero-text">
          <h1>The Bright Future of Web 3.0?</h1>
          <div class="hero-description">
            <p>
              We dive into the next evolution of the web that claims to put the
              power of the platforms back into the hands of the people. But is
              it really fulfilling its promise?
            </p>
            <button>Read More</button>
          </div>
        </div>
      </section>
      <!-- Sidebar -->
      <aside class="sidebar-container">
        <h2>New</h2>
        <template class="sidebar-template">
          <div class="sidebar-content">
            <h3 class="news-title">Hydrogen VS Electric Cars</h3>
            <p class="news-text">
              Will hydrogen-fueled cars ever catch up to EVs?
            </p>
          </div>
        </template>
      </aside>

      <!-- Articles list -->
      <section class="articles-list-container">
        <template class="article-template">
          <div class="article-container">
            <div class="article-image-container">
              <img
                class="article-image"
                src="assets/images/image-retro-pcs.jpg"
                alt="Retro PC"
              />
            </div>
            <div class="article-content">
              <h4 class="article-number">01</h4>
              <h5 class="article-title">Reviving Retro PCs</h5>
              <p class="article-text">
                What happens when old PCs are given modern upgrades?
              </p>
            </div>
          </div>
        </template>
      </section>
    </main>
    <footer></footer>
    <script src="assets/js/mobile-menu.js" defer></script>
    <script src="assets/js/articles.js" defer></script>
  </body>
</html>
